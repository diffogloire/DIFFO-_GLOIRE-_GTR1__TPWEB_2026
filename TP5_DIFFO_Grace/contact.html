<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Contact - Mon mini-site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
       <header>
  <h1>Page de contact</h1>
       </header>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="presentation.html">Présentation</a>
    <a href="contact.html">Contact</a>
  </nav>
  <h2>Formulaire de contact</h2>
  <p>Veuillez remplir ce formulaire pour envoyer un message.</p>
  <form>
    <!-- Nom -->
    <label for="nom">Nom :</label>
    <input type="text" id="nom" name="nom"
           placeholder="Entrez votre nom" required>
    <br><br>
    <!-- Prénom -->
    <label for="prenom">Prénom :</label>
    <input type="text" id="prenom" name="prenom"
           placeholder="Entrez votre prénom" required>
    <br><br>
    <!-- Email -->
    <label for="email">Adresse email :</label>
    <input type="email" id="email" name="email"
           placeholder="exemple@email.com" required>
    <br><br>
    <!-- Téléphone (§17) -->
    <label for="telephone">Téléphone :</label>
    <input type="tel" id="telephone" name="telephone"
           placeholder="+237 6 XX XX XX XX">
    <br><br>
    <!-- Domaine d'intérêt (§18) -->
    <label for="domaine">Domaine d'intérêt :</label>
    <select id="domaine" name="domaine" required>
      <option value="">-- Choisir un domaine --</option>
      <option value="reseaux">Réseaux informatiques</option>
      <option value="cybersecurite">Cybersécurité</option>
      <option value="developpement-web">Développement web</option>
      <option value="administration-systeme">Administration système</option>
    </select>
    <br><br>
    <!-- Motif (§12) -->
    <label for="motif">Motif du message :</label>
    <select id="motif" name="motif" required>
      <option value="">-- Choisir un motif --</option>
      <option value="information">Demande d'information</option>
      <option value="stage">Demande de stage</option>
      <option value="projet">Proposition de projet</option>
      <option value="autre">Autre demande</option>
    </select>
    <br><br>
    <!-- Boutons radio (§13) -->
    <p>Statut du visiteur :</p>
    <input type="radio" id="etudiant" name="statut"
           value="etudiant" required>
    <label for="etudiant">Étudiant</label><br>
    <input type="radio" id="enseignant" name="statut"
           value="enseignant">
    <label for="enseignant">Enseignant</label><br>
    <input type="radio" id="professionnel" name="statut"
           value="professionnel">
    <label for="professionnel">Professionnel</label>
    <br><br>
    <!-- Message -->
    <label for="message">Message :</label><br>
    <textarea id="message" name="message"
              rows="5" cols="40"
              placeholder="Écrivez votre message ici"
              required></textarea>
    <br><br>
    <!-- Confirmation (§14) -->
    <input type="checkbox" id="confirmation"
           name="confirmation" required>
    <label for="confirmation">Je confirme que les informations
      saisies sont correctes.</label>
    <br><br>
    <button type="submit">Envoyer</button>
    <button type="reset">Effacer</button>
  </form>
  <footer>
        <p>&copy; 2026 - Mon mini-site</p>
    </footer>
</body>
</html>
